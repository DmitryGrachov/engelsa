# root = dist/ после `npm run build`
#
# Кэш:
# - index.html — всегда свежий (иначе браузер держит старые ссылки на index-*.js)
# - _bundle/*-[hash].js — можно кэшировать навсегда (имя меняется при новом билде)
# - vendor-*.js — хеш тот же, пока не меняли lib/index.js (это нормально)

server {
    listen 80;
    server_name example.com;

    root /var/www/sofera/dist;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri =404;
    }

    location = /build-id.txt {
        add_header Cache-Control "no-cache" always;
    }

    location /_bundle/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location /assets/ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate" always;
        try_files $uri =404;
    }

    location /models/ {
        alias /var/www/models/;
        expires 7d;
        add_header Cache-Control "public" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
